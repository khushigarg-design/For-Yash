<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Yash 💗</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff);
font-family:Arial;
overflow:hidden;
}

/* Title */

.title{
position:absolute;
top:40px;
font-size:40px;
color:#ff4fa3;
font-weight:bold;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Letter */

.letter{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.4s;
}

.letter:hover{
transform:scale(1.05);
}

.message{
display:none;
font-size:22px;
color:#ff2f92;
margin-top:10px;
text-align:center;
}

/* Floating hearts */

.heart{
position:absolute;
color:pink;
font-size:20px;
animation:rise 6s linear infinite;
}

@keyframes rise{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

.cursor-heart{
position:absolute;
pointer-events:none;
font-size:20px;
animation:fade 1s linear forwards;
}

@keyframes fade{
0%{opacity:1; transform:scale(1)}
100%{opacity:0; transform:scale(2)}
}

</style>
</head>

<body>

<div class="title">For Yash 💗</div>

<div class="letter" onclick="openLetter()">
Click to open letter 💌
<div class="message" id="msg">
tu pagal hai gadhe tere daath cute hai 😭💗
</div>
</div>

<script>

/* open letter */

function openLetter(){
document.getElementById("msg").style.display="block";
}

/* floating hearts */

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");

const colors=["#ff69b4","#ff1493","#ffffff"];

heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.color=colors[Math.floor(Math.random()*colors.length)];
heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,500);

/* cursor hearts */

document.addEventListener("mousemove",function(e){

const heart=document.createElement("div");
heart.classList.add("cursor-heart");

heart.innerHTML="❤";

const colors=["#ff69b4","#ff1493","#ffffff"];
heart.style.color=colors[Math.floor(Math.random()*colors.length)];

heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

</script>

</body>
</html>
